upstream auth_service {
    server auth-service:8001;
}

upstream ai_service {
    server ai-service:8002;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 10M;

    # Auth Service routes
    location /auth/ {
        proxy_pass http://auth_service/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Correlation-ID $http_x_correlation_id;
    }

    # Auth Service metrics
    location /auth/metrics {
        proxy_pass http://auth_service/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Correlation-ID $http_x_correlation_id;
    }

    # AI Service routes
    location /chat/ {
        proxy_pass http://ai_service/chat/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Correlation-ID $http_x_correlation_id;
    }

    # AI Service metrics
    location /chat/metrics {
        proxy_pass http://ai_service/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Correlation-ID $http_x_correlation_id;
    }

    # AI Service health
    location /chat/health {
        proxy_pass http://ai_service/health;
        proxy_set_header Host $host;
        proxy_set_header X-Correlation-ID $http_x_correlation_id;
    }

    location /stats {
        proxy_pass http://ai_service/stats;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Correlation-ID $http_x_correlation_id;
    }

    # Health check aggregator
    location /health {
        default_type application/json;
        return 200 '{"status": "healthy", "service": "gateway"}';
    }


    # Frontend (static files)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
