# ============================================================
# Docker Compose — Inti Rupa Cloud App
# Komputasi Awan — SI ITK
# ============================================================
# Usage:
#   docker compose up -d          # Start semua services
#   docker compose down            # Stop & remove
#   docker compose logs -f         # Lihat logs
#   docker compose ps              # Status services
# ============================================================

services:
  # ==================== DATABASE ====================
  db:
    image: postgres:16-alpine
    container_name: intirupa-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: intirupa
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - intirupa
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d intirupa"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==================== BACKEND ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: intirupa-backend
    container_name: intirupa-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    ports:
      - "8000:8000"
    networks:
      - intirupa
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ==================== FRONTEND ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    image: intirupa-frontend
    container_name: intirupa-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - intirupa
    depends_on:
      - backend

# ==================== VOLUMES ====================
volumes:
  pgdata:
    name: intirupa

# ==================== NETWORKS ====================
networks:
  intirupa:
    name: intirupa
    driver: bridge