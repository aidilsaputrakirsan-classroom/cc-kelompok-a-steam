# ==============================================
# CI Pipeline — Cloud App STEAM
# ==============================================
# Pipeline ini berjalan otomatis saat:
# - Push ke branch main
# - Pull Request ke branch main
# 
# Jobs:
# 1. test-backend: Install deps + run pytest
# 2. test-frontend: Install deps + run vitest
# 3. build-docker: Build Docker images

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ================================
  # JOB 1: Test Backend (Python/FastAPI)
  # ================================
  test-backend:
    name: 🐍 Test Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 📥 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Run tests
        env:
          DATABASE_URL: "sqlite:///./test.db"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
        run: |
          pytest

  # ================================
  # JOB 2: Test Frontend (React/Vitest)
  # ================================
  test-frontend:
    name: ⚛️ Test Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🧪 Run tests
        run: npm test

      - name: 🏗️ Build frontend
        run: npm run build

  # ================================
  # JOB 3: Build Docker Images
  # ================================
  build-docker:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Build backend image
        run: docker build -t intirupa-backend:ci ./backend

      - name: 🐳 Build frontend image
        run: docker build --build-arg VITE_API_URL=http://localhost:8000 -t intirupa-frontend:ci ./frontend

      - name: ✅ Build success
        run: |
          echo "✅ All Docker images built successfully!"
          docker images | grep intirupa

  # ================================
  # JOB 4: Deploy ke Railway
  # ================================
  deploy:
    name: 🚀 Deploy to Railway
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, build-docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # ↑ HANYA deploy saat push ke main (bukan saat PR)

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚂 Install Railway CLI
        run: npm install -g @railway/cli

      - name: 🚀 Deploy Backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          # Set these repository/environment variables from the Railway dashboard.
          # Use the target Railway Project ID and Environment ID for this deployment.
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
        run: |
          cd backend
          railway link --project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_ENVIRONMENT_ID" --service backend
          railway up --service backend --detach

      - name: 🚀 Deploy Frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          # Set these repository/environment variables from the Railway dashboard.
          # Use the same target Railway Project ID and Environment ID used by the backend deploy.
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
        run: |
          cd frontend
          railway link --project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_ENVIRONMENT_ID" --service cc-kelompok-a-steam
          railway up --service cc-kelompok-a-steam --detach

      - name: 🩺 Automated Health Check
        run: |
          echo "Waiting 20 seconds for services to boot up..."
          sleep 20
          
          echo "Checking Backend Health..."
          BACKEND_URL="https://cc-kelompok-a-steam-production.up.railway.app/health"
          echo "Calling $BACKEND_URL..."
          BACKEND_RESPONSE=$(curl -s $BACKEND_URL)
          echo "Response: $BACKEND_RESPONSE"
          
          if [[ "$BACKEND_RESPONSE" != *"healthy"* ]]; then
            echo "❌ Backend Health Check FAILED!"
            exit 1
          fi
          echo "✅ Backend is HEALTHY!"
          
          echo "Checking Frontend Health..."
          FRONTEND_URL="https://cc-kelompok-a-steam-production-51bf.up.railway.app"
          echo "Calling $FRONTEND_URL..."
          FRONTEND_STATUS=$(curl -o /dev/null -s -w "%{http_code}" $FRONTEND_URL)
          echo "HTTP Status Code: $FRONTEND_STATUS"
          
          if [ "$FRONTEND_STATUS" -ne 200 ]; then
            echo "❌ Frontend Health Check FAILED with status code $FRONTEND_STATUS!"
            exit 1
          fi
          echo "✅ Frontend is HEALTHY!"

      - name: ✅ Deploy complete
        run: |
          echo "✅ Deployment and health checks completed successfully!"
          echo "Backend: https://cc-kelompok-a-steam-production.up.railway.app"
          echo "Frontend: https://cc-kelompok-a-steam-production-51bf.up.railway.app"
